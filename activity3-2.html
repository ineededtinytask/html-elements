<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap example</title>
    <link rel="stylesheet" href="
https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>resize the browser window to see the effect</h1>
        <div class="row">
            <div class="col-md-8 col-xs-4" style="background-color: red; border: 1px solid black;">random stuff</div>
            <div class="col-md-12 col-md-5 col-xs-4" style="background-color: red; border: 1px solid black;">random stuff</div>
            <!-- first coloumn will get replaced by the second coloumn -->
        </div> 
        <div class="row">
            <div class="col-md-12 col-lg-6" style="background-color: red; border: 1px solid black;">random stuff</div>
        </div>
        </div>
</body>
</html>
